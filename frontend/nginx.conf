# Stateless REST calls (proxied straight through to Java) — plain
# round-robin, any instance can serve them.
upstream go_collab_rest {
    server go-collab:8080 max_fails=1 fail_timeout=10s;
    server go-collab-2:8080 max_fails=1 fail_timeout=10s;
}

# WebSocket connections carry per-document Hub state (OT, cursors,
# presence) in-memory on whichever Go instance handles them. Hashing by
# docId keeps every client for the same document on the same node in the
# common case, avoiding the cross-node replication path entirely instead
# of just relying on it to paper over round-robin's random split.
upstream go_collab_ws {
    hash $docid consistent;
    server go-collab:8080 max_fails=1 fail_timeout=10s;
    server go-collab-2:8080 max_fails=1 fail_timeout=10s;
}

server {
    listen 80;
    resolver 127.0.0.11 valid=10s;

    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback
    location /assets/ {
        try_files $uri =404;
    }

    location / {
        add_header Cache-Control "no-store" always;
        try_files $uri $uri/ /index.html;
    }

    # WebSocket — hashed by docId so a document's Hub state stays on one
    # node instead of round-robin scattering its clients across both.
    location ~ ^/api/ws/([^/?]+)$ {
        set $docid $1;
        proxy_pass         http://go_collab_ws/ws/$docid$is_args$args;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_read_timeout 3600s;
    }

    # Everything else under /api/ — stateless REST proxy (prefix removed
    # before encaminhar).
    location ~ ^/api/(.*)$ {
        set $path $1;
        proxy_pass         http://go_collab_rest/$path$is_args$args;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_read_timeout 3600s;
    }

    # gRPC-Web analytics endpoint. Browser calls /grpc/...; Envoy translates it
    # to native HTTP/2 gRPC for the Java backend.
    location ~ ^/grpc/(.*)$ {
        set $grpc_upstream grpc-web:8082;
        proxy_pass         http://$grpc_upstream/grpc/$1$is_args$args;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
