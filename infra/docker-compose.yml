services:

  # ── Infraestrutura ────────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: collabdocs
      POSTGRES_USER: collabdocs
      POSTGRES_PASSWORD: collabdocs
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./postgres/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U collabdocs"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.2-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    restart: unless-stopped
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 10s
      timeout: 10s
      retries: 10

  kafka-init:
    image: confluentinc/cp-kafka:7.6.0
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/bash", "/opt/topics.sh"]
    volumes:
      - ./kafka/topics.sh:/opt/topics.sh:ro
    environment:
      KAFKA_BOOTSTRAP: kafka:29092
      REPLICATION_FACTOR: 1

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"

  # ── Serviços Go ───────────────────────────────────────────────────────────

  gateway:
    build:
      context: ../go/gateway
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      PORT: 8080
      JWT_SECRET: ${JWT_SECRET:-collabdocs-dev-secret-key-32chars!!}
      REDIS_ADDR: redis:6379
      KAFKA_BROKERS: kafka:29092
      DOC_SERVICE_ADDR: doc-service:50051
      COLLAB_SERVICE_ADDR: collab-service:50052
      USER_SERVICE_URL: http://user-service:8081

  doc-service:
    build:
      context: ../go/doc-service
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      GRPC_PORT: 50051
      DATABASE_URL: postgres://collabdocs:collabdocs@postgres:5432/collabdocs
      REDIS_ADDR: redis:6379
      KAFKA_BROKERS: kafka:29092

  collab-service:
    build:
      context: ../go/collab-service
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    environment:
      GRPC_PORT: 50052
      REDIS_ADDR: redis:6379

  # ── Serviços Java (contexto = java/ inteiro para acesso ao parent pom.xml) ─

  user-service:
    build:
      context: ../java
      dockerfile: user-service/Dockerfile
    restart: unless-stopped
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      SERVER_PORT: 8081
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/collabdocs
      SPRING_DATASOURCE_USERNAME: collabdocs
      SPRING_DATASOURCE_PASSWORD: collabdocs
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      JWT_SECRET: ${JWT_SECRET:-collabdocs-dev-secret-key-32chars!!}


  spell-worker:
    build:
      context: ../java
      dockerfile: spell-worker/Dockerfile
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092

  audit-worker:
    build:
      context: ../java
      dockerfile: audit-worker/Dockerfile
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092

  notif-worker:
    build:
      context: ../java
      dockerfile: notif-worker/Dockerfile
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092


volumes:
  postgres_data:
  minio_data:
